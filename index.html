<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI - La forza di volare</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --petrol:#0D5B61;
    --petrol-dark:#083E43;
    --aqua:#A7DCD5;
    --aqua-dark:#73C8C1;
    --sand:#EFE2D5;
    --ivory:#F8F2EC;
    --text:#112326;
    --text-light:#647478;

    --radius:28px;

    --shadow:
    0 15px 40px rgba(13,91,97,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--ivory);
    color:var(--text);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
}

/* ALI watermark */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    url("ali.png")
    center center
    no-repeat;

    background-size:420px;

    opacity:.035;

    pointer-events:none;

    z-index:0;
}

.container{

    width:100%;
    max-width:900px;

    margin:0 auto;

    padding:20px;

    position:relative;

    z-index:2;
}

/* DECORAZIONI */

.decor-top{

    position:absolute;

    top:0;
    left:0;

    width:220px;
    height:220px;

    background:
    radial-gradient(
        circle at top left,
        rgba(13,91,97,.18),
        rgba(13,91,97,0)
    );

    pointer-events:none;
}

.decor-bottom{

    position:absolute;

    right:0;
    bottom:0;

    width:260px;
    height:260px;

    background:
    radial-gradient(
        circle at bottom right,
        rgba(13,91,97,.15),
        rgba(13,91,97,0)
    );

    pointer-events:none;
}

.dots-top{

    position:absolute;

    right:10px;
    top:40px;

    width:80px;
    height:80px;

    background-image:
    radial-gradient(
        var(--petrol) 1.5px,
        transparent 1.5px
    );

    background-size:16px 16px;

    opacity:.5;

    pointer-events:none;
}

.dots-bottom{

    position:absolute;

    left:10px;
    bottom:220px;

    width:80px;
    height:80px;

    background-image:
    radial-gradient(
        var(--petrol) 1.5px,
        transparent 1.5px
    );

    background-size:16px 16px;

    opacity:.5;

    pointer-events:none;
}

/* HERO */

.hero{

    text-align:center;

    padding-top:20px;

    margin-bottom:30px;
}

.logo{

    width:90px;
    height:90px;

    object-fit:contain;

    display:block;

    margin:0 auto 16px;
}

h1{

    font-family:'Oswald',sans-serif;

    font-size:4rem;

    line-height:1;

    letter-spacing:1px;

    color:var(--petrol-dark);

    margin-bottom:8px;
}

.subtitle{

    color:var(--petrol);

    font-weight:600;

    font-size:1rem;

    letter-spacing:2px;

    text-transform:uppercase;

    margin-bottom:18px;
}

.hero-copy{

    max-width:360px;

    margin:0 auto;

    color:var(--text-light);

    line-height:1.8;

    font-size:1rem;
}

/* CARD */

.card{

    background:var(--sand);

    border-radius:var(--radius);

    padding:24px;

    margin-bottom:20px;

    box-shadow:var(--shadow);

    position:relative;

    overflow:hidden;
}

.card::after{

    content:"";

    position:absolute;

    left:0;
    right:0;
    top:0;

    height:5px;

    background:var(--petrol);
}

.section-label{

    display:inline-block;

    background:var(--aqua);

    color:var(--petrol-dark);

    font-weight:700;

    font-size:.85rem;

    letter-spacing:.5px;

    text-transform:uppercase;

    padding:8px 16px;

    border-radius:12px;

    margin-bottom:18px;
}

.section-title{

    font-family:'Oswald',sans-serif;

    font-size:1.9rem;

    line-height:1.1;

    color:var(--petrol-dark);

    margin-bottom:16px;
}

/* CARD PRINCIPALE CONSIGLIO */

.coach-card{

    text-align:center;
}

.mini-ali{

    width:70px;

    display:block;

    margin:0 auto 18px;

    opacity:.9;
}

.quote{

    font-family:'Oswald',sans-serif;

    font-size:3rem;

    line-height:1.05;

    color:var(--petrol-dark);

    margin-bottom:20px;
}

.quote strong{

    color:var(--petrol);
}

.brush-line{

    width:120px;

    height:5px;

    background:var(--petrol);

    border-radius:999px;

    margin:20px auto;
}

.actions{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:12px;

    margin-top:20px;
}

button,
.instagram-btn{

    border:none;

    text-decoration:none;

    cursor:pointer;

    border-radius:14px;

    font-size:.95rem;

    font-weight:600;

    transition:.25s;

    padding:12px 18px;
}

.share-btn{

    background:var(--aqua);

    color:var(--petrol-dark);
}

.share-btn:hover{

    transform:translateY(-2px);
}

.instagram-btn{

    background:var(--petrol);

    color:white;
}

.instagram-btn:hover{

    background:var(--petrol-dark);
}

.text{

    line-height:1.9;

    color:var(--text);
}

.question-card{

    background:
    linear-gradient(
        135deg,
        var(--aqua),
        #bfe7e2
    );
}

.question{

    font-size:1.15rem;

    line-height:1.8;

    font-weight:500;

    color:var(--petrol-dark);
}

/* FORM */

textarea{

    width:100%;

    min-height:200px;

    border:none;

    resize:vertical;

    border-radius:18px;

    background:white;

    padding:18px;

    font-family:inherit;

    font-size:1rem;

    color:var(--text);

    outline:none;
}

textarea:focus{

    box-shadow:
    0 0 0 2px rgba(13,91,97,.18);
}

.primary-btn{

    background:var(--petrol);

    color:white;
}

.primary-btn:hover{

    background:var(--petrol-dark);
}

@media (min-width:768px){

    .container{
        padding:35px;
    }

    h1{
        font-size:5rem;
    }

    .quote{
        font-size:4rem;
    }

    .card{
        padding:34px;
    }
}

</style>
</head>

<body>

<div class="decor-top"></div>
<div class="decor-bottom"></div>
<div class="dots-top"></div>
<div class="dots-bottom"></div>

<div class="container">

<div class="hero">

<img src="ali.png" alt="ALI" class="logo">

<h1>ALI</h1>

<div class="subtitle">
La forza di volare
</div>

<div class="hero-copy">
Ritrova te stessa,<br>
un passo alla volta.
</div>

</div>

<div class="card coach-card">

<img src="ali.png" class="mini-ali" alt="Ali">

<div class="section-label">
Consiglio della Coach
</div>

<div id="frase" class="quote">
Caricamento...
</div>

<div class="brush-line"></div>

<div class="actions">

<button
class="share-btn"
onclick="condividiConsiglio()">
Condividi il consiglio
</button>

<a
class="instagram-btn"
href="https://www.instagram.com/elisabettagatti_/"
target="_blank"
rel="noopener">
Segui Elisabetta
</a>

</div>

</div>
