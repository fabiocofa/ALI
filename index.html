<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI - La forza di volare</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ALI">
<meta name="theme-color" content="#1F5A5A">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at top right, rgba(139,207,208,.20), transparent 30%),
radial-gradient(circle at bottom left, rgba(139,207,208,.15), transparent 35%),
#F5EFE6;

font-family:'Montserrat',sans-serif;
color:#1F5A5A;
min-height:100vh;
}

.container{
max-width:650px;
margin:auto;
padding:25px;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

.card{
background:#FBF8F3;
border-radius:32px;
padding:32px;
box-shadow:0 18px 45px rgba(0,0,0,.08);
position:relative;
overflow:hidden;
}

.card:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:10px;
background:#8BCFD0;
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
width:120px;
max-width:100%;
}

.brand{
font-family:'Cormorant Garamond',serif;
font-size:58px;
font-weight:700;
text-align:center;
letter-spacing:4px;
color:#1F5A5A;
}

.subtitle{
font-size:13px;
letter-spacing:4px;
text-transform:uppercase;
text-align:center;
margin-top:-5px;
margin-bottom:18px;
color:#5D7D7D;
font-weight:600;
}

.divider{
width:120px;
height:3px;
background:#8BCFD0;
margin:0 auto 25px auto;
border-radius:20px;
}

.tag{
text-align:center;
font-weight:700;
font-size:14px;
letter-spacing:2px;
text-transform:uppercase;
color:#1F5A5A;
margin-bottom:30px;
}

.quote{
font-family:'Cormorant Garamond',serif;
font-size:48px;
font-weight:700;
line-height:1.1;
text-align:center;
color:#163D3D;
margin-bottom:15px;
}

.btn{
width:100%;
border:none;
background:#1F5A5A;
color:white;
padding:16px;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
margin-top:15px;
transition:.2s;
}

.btn:hover{
opacity:.9;
}

.share-btn{
background:#8BCFD0;
color:#163D3D;
}

.footer-brand{
margin-top:30px;
padding-top:20px;
border-top:1px solid rgba(31,90,90,.15);
display:flex;
justify-content:space-between;
align-items:center;
}

.footer-text{
font-size:13px;
line-height:1.6;
color:#5D7D7D;
}

.instagram-link{
text-decoration:none;
color:#1F5A5A;
font-weight:700;
font-size:14px;
}

.instagram-link:hover{
opacity:.7;
}

#detail{
display:none;
}

.detail-title{
font-family:'Cormorant Garamond',serif;
font-size:42px;
font-weight:700;
line-height:1.1;
text-align:center;
margin-bottom:25px;
color:#163D3D;
}

.detail-text{
font-size:18px;
line-height:1.9;
color:#284848;
}

@media(max-width:600px){

.brand{
font-size:46px;
}

.quote{
font-size:38px;
}

.detail-title{
font-size:34px;
}

.logo img{
width:100px;
}

}

</style>

</head>

<body>

<div class="container" id="home">

<div class="card">

<div class="logo">
<img src="ali.png" alt="ALI">
</div>

<div class="brand">ALI</div>

<div class="subtitle">
La forza di volare
</div>

<div class="divider"></div>

<div class="tag" id="titolo"></div>

<div class="quote" id="fraseDelGiorno"></div>

<button class="btn" onclick="openDetail()">
Approfondisci
</button>

<button class="btn share-btn" onclick="shareReflection()">
Condividi riflessione
</button>

<div class="footer-brand">

<div class="footer-text">
Un progetto di<br>
<strong>Elisabetta Gatti Coach</strong>
</div>

<a
class="instagram-link"
href="https://www.instagram.com/elisabettagatti_/"
target="_blank">

Instagram

</a>

</div>

</div>

</div>

<div class="container" id="detail">

<div class="card">

<div class="logo">
<img src="ali.png" alt="ALI">
</div>

<div class="brand">ALI</div>

<div class="subtitle">
La forza di volare
</div>

<div class="detail-title" id="detailTitle"></div>

<div class="detail-text" id="detailText"></div>

<button class="btn" onclick="closeDetail()">
Torna alla riflessione
</button>

</div>

</div>

<script src="frasi.js"></script>

<script>

document.getElementById("titolo").innerText = contenuto.titolo;
document.getElementById("fraseDelGiorno").innerText = contenuto.frase;

document.getElementById("detailTitle").innerText = contenuto.frase;
document.getElementById("detailText").innerText = contenuto.testo;

function openDetail(){

document.getElementById("home").style.display="none";
document.getElementById("detail").style.display="flex";

window.scrollTo(0,0);

}

function closeDetail(){

document.getElementById("detail").style.display="none";
document.getElementById("home").style.display="flex";

window.scrollTo(0,0);

}

function shareReflection(){

const testo =
contenuto.frase +
"\n\n— ALI | La forza di volare" +
"\nUn progetto di Elisabetta Gatti Coach" +
"\nhttps://fabiocofa.github.io/ALI/";

if(navigator.share){

navigator.share({
title:"ALI",
text:testo
});

}else{

navigator.clipboard.writeText(testo);
alert("Riflessione copiata negli appunti");

}

}

</script>

</body>
</html>
