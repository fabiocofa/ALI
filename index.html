<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALI - La forza di volare</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f8f4f1;
    --card:#ffffff;
    --primary:#0E6A72;
    --primary-dark:#0A5157;
    --secondary:#7FCFD1;
    --text:#2f2a28;
    --text-light:#6f6865;
    --shadow:0 12px 35px rgba(0,0,0,.08);
    --radius:24px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,#FBF6F0 0%,#F4E9DC 100%);
    color:var(--text);
    min-height:100vh;
    padding:20px;
    body::before{
    content:"";
    position:fixed;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    width:450px;
    height:450px;
    background:url('ali.png') center center no-repeat;
    background-size:contain;
    opacity:0.04;
    pointer-events:none;
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    width:100%;
    max-width:850px;
    margin:0 auto;
}

.hero{
    text-align:center;
    margin-bottom:24px;
}

.logo{
    width:90px;
    height:90px;
    object-fit:contain;
    margin:10px auto 15px;
    display:block;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:3rem;
    font-weight:700;
    color:var(--primary-dark);
}

.subtitle{
    margin-top:8px;
    color:var(--text-light);
    font-size:1rem;
    letter-spacing:.5px;
}

.card{
    background:var(--card);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:18px;
    box-shadow:var(--shadow);
}

.section-title{
    font-family:'Playfair Display',serif;
    font-size:1.4rem;
    margin-bottom:14px;
    color:var(--primary-dark);
}

.daily-title{
    font-size:1.2rem;
    font-weight:600;
    margin-bottom:14px;
}

.quote{
    font-size:1.15rem;
    line-height:1.8;
    color:var(--text);
    font-style:italic;
}

.text{
    line-height:1.8;
    color:var(--text);
}

.question{
    font-size:1.1rem;
    font-weight:500;
    line-height:1.6;
}

textarea{
    width:100%;
    min-height:180px;
    resize:vertical;
    border:none;
    background:#faf8f7;
    border-radius:18px;
    padding:18px;
    font-family:inherit;
    font-size:1rem;
    outline:none;
    color:var(--text);
}

.actions{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:16px;
}

button,
.share-btn,
.instagram-btn{
    border:none;
    text-decoration:none;
    cursor:pointer;
    padding:14px 18px;
    border-radius:14px;
    font-size:.95rem;
    font-weight:600;
    transition:.25s;
}

.primary-btn{
    background:var(--primary);
    color:white;
}

.primary-btn:hover{
    background:var(--primary-dark);
}

.share-btn{
    background:#efe2da;
    color:var(--primary-dark);
    padding:10px 14px;
    font-size:.85rem;
}

.instagram-btn{
    background:#f7edf0;
    color:#b04c7a;
}

.entry{
    background:#faf7f5;
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
}

.entry-date{
    font-size:.85rem;
    color:var(--text-light);
    margin-bottom:8px;
}

.entry-text{
    white-space:pre-wrap;
    line-height:1.7;
}

.delete-btn{
    margin-top:12px;
    background:#fff;
    border:1px solid #e0d5cf;
    color:#8a5d52;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

.empty{
    color:var(--text-light);
    text-align:center;
    padding:10px;
}

footer{
    text-align:center;
    margin-top:30px;
    padding-bottom:20px;
    color:var(--text-light);
    font-size:.9rem;
}

@media (min-width:768px){

    body{
        padding:30px;
    }

    h1{
        font-size:4rem;
    }

    .card{
        padding:30px;
    }

    .actions{
        justify-content:flex-start;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="hero">
        <img src="ali.png" alt="ALI" class="logo">
        <h1>ALI</h1>
        <div class="subtitle">La forza di volare</div>
    </div>



    <div class="card">
        <div class="section-title">Consiglio della Coach</div>
        <div id="frase" class="quote">
            Caricamento...
        </div>

        <div class="actions">
            <button class="share-btn" onclick="condividiConsiglio()">
                Condividi il consiglio
            </button>

            <a
                class="instagram-btn"
                href="https://www.instagram.com/elisabettagatti_/"
                target="_blank"
                rel="noopener"
            >
                Segui Elisabetta
            </a>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Approfondimento</div>
        <div id="testo" class="text">
            Caricamento...
        </div>
    </div>

    <div class="card">
        <div class="section-title">Domanda del giorno</div>
        <div id="domanda" class="question">
            Caricamento...
        </div>
    </div>

    <div class="card">
        <div class="section-title">Il mio spazio</div>

        <textarea
            id="riflessione"
            placeholder="Scrivi liberamente ciò che senti, pensi o desideri ricordare..."
        ></textarea>

        <div class="actions">
            <button class="primary-btn" onclick="salvaDiario()">
                Salva nel diario
            </button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Le mie riflessioni</div>
        <div id="storico"></div>
    </div>

    <footer>
        ALI • Un progetto di Elisabetta Gatti Coach
    </footer>

</div>

<script src="frasi.js"></script>
    
<script>
/*
Compatibile con frasi.js

Esempio:

const frasi = [
{
    titolo:"...",
    frase:"...",
    testo:"...",
    domanda:"..."
}
];
*/

let fraseDelGiorno = {
    titolo:"Benvenuta",
    frase:"Ogni giorno è una nuova possibilità.",
    testo:"Inserisci il file frasi.js per visualizzare i contenuti dinamici.",
    domanda:"Qual è il primo piccolo passo che puoi fare oggi?"
};

function ottieniIndiceDelGiorno(max){
    const oggi = new Date();
    const inizio = new Date(oggi.getFullYear(),0,0);
    const diff = oggi - inizio;
    const giorno = Math.floor(diff / 86400000);
    return giorno % max;
}

function caricaFraseDelGiorno(){

    if(
        typeof frasi !== "undefined" &&
        Array.isArray(frasi) &&
        frasi.length > 0
    ){
        fraseDelGiorno = frasi[
            ottieniIndiceDelGiorno(frasi.length)
        ];
    }



    document.getElementById("frase").textContent =
        fraseDelGiorno.frase || "";

    document.getElementById("testo").textContent =
        fraseDelGiorno.testo || "";

    document.getElementById("domanda").textContent =
        fraseDelGiorno.domanda || "";
}

function getDataOggi(){
    const oggi = new Date();

    return oggi.getFullYear() + "-" +
        String(oggi.getMonth()+1).padStart(2,"0") + "-" +
        String(oggi.getDate()).padStart(2,"0");
}

function salvaDiario(){

    const testo = document
        .getElementById("riflessione")
        .value
        .trim();

    if(!testo){
        alert("Scrivi una riflessione prima di salvare.");
        return;
    }

    const archivio =
        JSON.parse(
            localStorage.getItem("ali_diario") || "[]"
        );

    archivio.unshift({
        id: Date.now(),
        data: getDataOggi(),
        ora: new Date().toLocaleTimeString("it-IT"),
        testo
    });

    localStorage.setItem(
        "ali_diario",
        JSON.stringify(archivio)
    );

    document.getElementById("riflessione").value = "";

    renderDiario();
}

function eliminaVoce(id){

    const archivio =
        JSON.parse(
            localStorage.getItem("ali_diario") || "[]"
        );

    const nuovo =
        archivio.filter(v => v.id !== id);

    localStorage.setItem(
        "ali_diario",
        JSON.stringify(nuovo)
    );

    renderDiario();
}

function renderDiario(){

    const contenitore =
        document.getElementById("storico");

    const archivio =
        JSON.parse(
            localStorage.getItem("ali_diario") || "[]"
        );

    if(archivio.length === 0){
        contenitore.innerHTML =
            '<div class="empty">Nessuna riflessione salvata.</div>';
        return;
    }

    contenitore.innerHTML = archivio.map(item => `
        <div class="entry">
            <div class="entry-date">
                ${item.data} • ${item.ora}
            </div>

            <div class="entry-text">
                ${escapeHtml(item.testo)}
            </div>

            <button
                class="delete-btn"
                onclick="eliminaVoce(${item.id})"
            >
                Elimina
            </button>
        </div>
    `).join("");
}

function escapeHtml(text){
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

async function condividiConsiglio(){

    const testo =
`${fraseDelGiorno.frase}

${fraseDelGiorno.domanda}

ALI - La forza di volare`;

    if(
        navigator.share
    ){
        try{
            await navigator.share({
                title:"ALI",
                text:testo
            });
        }catch(e){}
    }else{

        try{
            await navigator.clipboard.writeText(testo);
            alert("Consiglio copiato negli appunti.");
        }catch(e){
            alert(testo);
        }
    }
}

caricaFraseDelGiorno();
renderDiario();
</script>

</body>
</html>
