<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI</title>

<link rel="manifest" href="manifest.json">

<style>

body{
    margin:0;
    font-family: Georgia, serif;
    background:#f6f0e8;
    color:#23443f;
}

.container{
    max-width:500px;
    margin:auto;
    padding:30px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:20px;
}

.brand{
    text-align:center;
    font-size:40px;
    font-weight:bold;
    letter-spacing:4px;
}

.tag{
    text-align:center;
    margin-top:10px;
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:12px;
}

.quote{
    margin-top:50px;
    font-size:34px;
    line-height:1.3;
    text-align:center;
}

.btn{
    margin-top:50px;
    border:none;
    background:#23443f;
    color:white;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

#detail{
    display:none;
}

.detail-title{
    font-size:28px;
    margin-bottom:20px;
    text-align:center;
}

.detail-text{
    line-height:1.8;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container" id="home">

<div class="logo">🪽</div>

<div class="brand">ALI</div>

<div class="tag">Riflessione del giorno</div>

<div class="quote" id="fraseDelGiorno"></div>

<button class="btn" onclick="openDetail()">
Approfondisci
</button>

</div>

<div class="container" id="detail">

<div class="detail-title" id="detailTitle"></div>

<div class="detail-text" id="detailText"></div>

<button class="btn" onclick="closeDetail()">
Torna indietro
</button>

</div>

<script src="frasi.js"></script>

<script>

document.getElementById("fraseDelGiorno").innerText = contenuto.frase;
document.getElementById("detailTitle").innerText = contenuto.frase;
document.getElementById("detailText").innerText = contenuto.testo;

function openDetail(){
    document.getElementById("home").style.display="none";
    document.getElementById("detail").style.display="flex";
}

function closeDetail(){
    document.getElementById("detail").style.display="none";
    document.getElementById("home").style.display="flex";
}

</script>
 
</body>
</html>
